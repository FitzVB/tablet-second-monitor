name: Rust Host CI/CD

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'host-windows/**'
      - '.github/workflows/rust-ci.yml'
      - 'requirements.json'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'host-windows/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --verbose --manifest-path host-windows/Cargo.toml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose --manifest-path host-windows/Cargo.toml

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --manifest-path host-windows/Cargo.toml

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --manifest-path host-windows/Cargo.toml -- -D warnings

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo build --release --manifest-path host-windows/Cargo.toml --verbose
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-windows-${{ matrix.os }}-${{ matrix.rust }}
          path: |
            host-windows/target/release/host-windows.exe
            host-windows/target/release/host-windows

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-tarpaulin
      - run: cargo tarpaulin --manifest-path host-windows/Cargo.toml --out Xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
