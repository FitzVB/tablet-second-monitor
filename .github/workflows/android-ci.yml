name: Android CI/CD

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'android-client/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'android-client/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x android-client/gradlew
      
      - name: Build APK (Debug)
        run: cd android-client && ./gradlew assembleDebug --info
      
      - name: Build APK (Release)
        run: cd android-client && ./gradlew assembleRelease --info
        continue-on-error: true  # Release build fails without signing
      
      - name: Run tests
        run: cd android-client && ./gradlew test --info
        continue-on-error: true
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android-client/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: android-client/app/build/reports/

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Run lint
        run: cd android-client && ./gradlew lint --info
        continue-on-error: true
      
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android-client/app/build/reports/lint-results-debug.html

  analyze:
    name: Code Analysis (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Run detekt analysis
        run: cd android-client && ./gradlew detekt --info
        continue-on-error: true
